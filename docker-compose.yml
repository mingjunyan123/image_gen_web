services:
  new-api:
    image: calciumion/new-api:latest
    container_name: new-api
    restart: always
    command: --log-dir /app/logs
    environment:
      TZ: Asia/Singapore

      # New-API 使用 SQLite，不配置 SQL_DSN
      SESSION_SECRET: "dxqHdcY0zbOC8dPqqsyHw9RVXIobhcig5fkdRChp57Q84svOldTAT5d1eK5EpE5m"
      CRYPTO_SECRET: "CRe6uym99Ognok64OCNrlKC1NPcm9x8g5pn6OAHhaLPXnnxNGAfY26xv7TWjXRqg"

      FRONTEND_BASE_URL: "https://domaeng.com"

      # 防止长输出/流式输出太快超时
      STREAMING_TIMEOUT: "300"
      RELAY_TIMEOUT: "300"

      # 单机 SQLite 先不启用 Redis / 批量更新
      BATCH_UPDATE_ENABLED: "false"

    volumes:
      - ./new-api-data:/data
      - ./new-api-logs:/app/logs
    expose:
      - "3000"
    networks:
      - ai-gateway

  cliproxyapi:
    image: eceasy/cli-proxy-api:latest
    container_name: cliproxyapi
    restart: always
    environment:
      TZ: Asia/Singapore
    volumes:
      - ./cliproxyapi/config.yaml:/CLIProxyAPI/config.yaml
      - ./cliproxyapi/auths:/root/.cli-proxy-api
      - ./cliproxyapi/logs:/CLIProxyAPI/logs
    expose:
      - "8317"

    # 只映射到服务器本机，公网不能直接访问
    # 用于你通过 SSH tunnel 管理 CLIProxyAPI
    ports:
      - "127.0.0.1:8317:8317"

    networks:
      - ai-gateway

  image-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: image-service
    restart: always
    environment:
      TZ: Asia/Singapore
      PORT: "3000"
      NEW_API_BASE_URL: "http://new-api:3000"
      IMAGE_DATA_DIR: "/data/image-service"
      # 线上请改成一段新的长随机字符串，改动后旧 token 加密内容将无法解密。
      IMAGE_SERVICE_SECRET: "change-this-image-service-secret-before-production"
      IMAGE_SESSION_DAYS: "7"
      IMAGE_MAX_GLOBAL_PROCESSING: "1"
      IMAGE_MAX_TOKEN_PROCESSING: "1"
      IMAGE_MAX_TOKEN_QUEUED: "5"
    volumes:
      - ./image-service-data:/data/image-service
    expose:
      - "3000"
    depends_on:
      - new-api
    networks:
      - ai-gateway

  nginx:
    image: nginx:stable
    container_name: nginx
    restart: always
    depends_on:
      - new-api
      - cliproxyapi
      - image-service
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
      - ./static:/usr/share/nginx/html/static:ro
    networks:
      - ai-gateway

networks:
  ai-gateway:
    driver: bridge
