services:
  image-service:
    build:
      context: /opt/image-web
      dockerfile: Dockerfile
    container_name: image-service
    restart: always
    environment:
      TZ: Asia/Singapore
      PORT: "3000"
      NEW_API_BASE_URL: "http://new-api:3000"
      IMAGE_DATA_DIR: "/data/image-service"
      IMAGE_SERVICE_SECRET: "change-this-image-service-secret-before-production"
      IMAGE_SESSION_DAYS: "7"
      IMAGE_MAX_GLOBAL_PROCESSING: "1"
      IMAGE_MAX_TOKEN_PROCESSING: "1"
      IMAGE_MAX_TOKEN_QUEUED: "5"
    volumes:
      - ./image-service-data:/data/image-service
    expose:
      - "3000"
    networks:
      - ai-gateway
