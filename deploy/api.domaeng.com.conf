map "$request_method:$uri" $openai_image_limit_key {
    default "";
    "~^POST:/v1/images/(generations|edits)$" $binary_remote_addr;
}

limit_req_zone $openai_image_limit_key zone=openai_images_per_ip:10m rate=3r/m;

server {
    listen 80;
    server_name api.domaeng.com www.api.domaeng.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.domaeng.com www.api.domaeng.com;

    ssl_certificate /etc/letsencrypt/live/api.domaeng.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.domaeng.com/privkey.pem;

    client_max_body_size 110m;
    limit_req_status 429;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_read_timeout 300s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;

    location = /image {
        return 301 /image/;
    }

    location ~ ^/(image/|image-api/|images/|videos/) {
        access_log /var/log/nginx/image-service.access.log;
        proxy_request_buffering on;
        proxy_pass http://image-service:3000;
    }

    location ~ ^/(v1/images/|v1beta/) {
        client_max_body_size 50m;
        access_log /var/log/nginx/image-api.access.log;
        limit_req zone=openai_images_per_ip;
        proxy_request_buffering on;
        proxy_pass http://new-api:3000;
    }

    location /static/ {
        alias /usr/share/nginx/html/static/;
        expires 30d;
        add_header Cache-Control "public";
    }

    location ~* gstatic {
        return 204;
    }

    location / {
        proxy_pass http://new-api:3000;
    }
}
