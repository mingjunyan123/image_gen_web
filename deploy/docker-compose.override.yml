services:
  image-service:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: image-service
    restart: always
    environment:
      TZ: Asia/Singapore
      PORT: "3000"
      NEW_API_BASE_URL: "http://new-api:3000"
      IMAGE_DATA_DIR: "/data/image-service"
      IMAGE_SERVICE_SECRET: "c55ba91a3eea2c6a03692c46fcdbcd8ab29bfc0091f5de115dff51b3261583a9"
      IMAGE_SESSION_DAYS: "7"
      IMAGE_MAX_GLOBAL_PROCESSING: "${IMAGE_MAX_GLOBAL_PROCESSING:-1}"
      IMAGE_MAX_TOKEN_PROCESSING: "${IMAGE_MAX_TOKEN_PROCESSING:-1}"
      IMAGE_MAX_TOKEN_QUEUED: "${IMAGE_MAX_TOKEN_QUEUED:-5}"
      IMAGE_WORKER_INTERVAL_MS: "1500"
      IMAGE_REQUEST_TIMEOUT_MS: "600000"
      IMAGE_MAX_UPLOAD_BYTES: "52428800"
      IMAGE_VIDEO_FEATURE_ENABLED: "false"
    volumes:
      - ../image-service-data:/data/image-service
    expose:
      - "3000"
    depends_on:
      - new-api
    networks:
      - ai-gateway

  nginx:
    image: nginx:stable
    container_name: nginx
    restart: always
    depends_on:
      - new-api
      - cliproxyapi
      - image-service
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./api.domaeng.com.conf:/etc/nginx/conf.d/api.domaeng.com.conf:ro
      - ../certbot/www:/var/www/certbot
      - ../certbot/conf:/etc/letsencrypt
      - ../static:/usr/share/nginx/html/static:ro
    networks:
      - ai-gateway
